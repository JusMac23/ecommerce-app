<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Store Admin Panel</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="admin-body">

    <div id="login-view" class="login-container">
        <div class="login-box">
            <h2>Admin Login</h2>
            <p>Enter password to manage store</p>
            
            <input type="password" id="admin-password" placeholder="Password">
            <button class="btn-primary w-100" onclick="checkLogin()">Login</button>
            
            <p id="login-error" class="error-msg">Incorrect Password!</p>
            <br>
            <a href="index.html" class="back-link-muted">← Back to Shop</a>
        </div>
    </div>

    <div id="admin-view" class="hidden">
        
        <nav class="admin-nav">
            <div class="logo">Admin Panel</div>
            <div class="nav-links">
                <a href="index.html" target="_blank">View Shop</a>
                <button onclick="logout()" class="btn-danger">Logout</button>
            </div>
        </nav>

        <div class="main-content">
            
            <div class="container admin-card">
                <h3>Add New Product</h3>
                <div class="form-group">
                    <input type="text" id="p-name" placeholder="Product Name">
                    <input type="number" id="p-price" placeholder="Price">
                    <input type="text" id="p-img" placeholder="Image URL (http://...)">
                    <button class="btn-primary" onclick="addProduct()">Add Product</button>
                </div>
            </div>

            <div class="container admin-card">
                <h3>Current Products</h3>
                <div class="table-responsive">
                    <table class="table">
                        <thead>
                            <tr>
                                <th>Image</th>
                                <th>Name</th>
                                <th>Price</th>
                                <th>Action</th>
                            </tr>
                        </thead>
                        <tbody id="admin-product-list">
                            </tbody>
                    </table>
                </div>
            </div>

            <div class="container admin-card">
                <h3>Customer Orders</h3>
                <div class="table-responsive">
                    <table class="table">
                        <thead>
                            <tr>
                                <th>ID</th>
                                <th>Customer Info</th>
                                <th>Product</th>
                                <th>Status</th>
                            </tr>
                        </thead>
                        <tbody id="admin-order-list">
                            </tbody>
                    </table>
                </div>
            </div>

        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
